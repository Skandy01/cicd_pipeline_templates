parameters:
    - name: nodeVersion
      type: string
      default: '16.x'
      
jobs:
    - job: Build
      displayName: Build React App

      steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Install Node
            inputs:
                versionSource: 'spec'
                versionSpec: '${{ parameters.nodeVersion }}'

          - script: npm install
            displayName: Install dependencies

          - script: npm run build
            displayName: Build App
